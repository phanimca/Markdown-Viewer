name: Auto-Tag Desktop Release

on:
  push:
    branches:
      - main
    paths:
      # Only trigger when desktop-app or core source files change
      - "desktop-app/**"
      - "script.js"
      - "styles.css"
      - "index.html"
      - "assets/**"

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version tag
        id: version
        run: |
          # Format: desktop-vYYYY.M.PATCH (e.g. desktop-v2026.3.1)
          YEAR=$(date -u +%Y)
          MONTH=$(date -u %-m)
          PREFIX="desktop-v${YEAR}.${MONTH}."

          # Find the highest existing patch for this YEAR.MONTH
          LATEST=$(git tag --list "${PREFIX}*" | sort -V | tail -1)
          if [ -z "$LATEST" ]; then
            PATCH=0
          else
            PATCH=$(echo "$LATEST" | awk -F. '{print $NF}')
            PATCH=$((PATCH + 1))
          fi

          TAG="${PREFIX}${PATCH}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Generated tag: $TAG"

      - name: Push new tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"